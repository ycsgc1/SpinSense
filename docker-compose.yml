services:
  spinsense:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: spinsense_engine
    restart: unless-stopped
    
    # --- COMMENTED OUT FOR MAC TESTING ---
    devices:
     - "/dev/snd:/dev/snd"
    
    group_add:
      - audio-
  
    ipc: host

    
    volumes:
      - ./config.json:/app/config.json
      - /tmp:/tmp
      
    # Map Mac port 3313 to Container port 8000
    ports:
      - "3313:8000"