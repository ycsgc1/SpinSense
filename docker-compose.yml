services:
  spinsense:
    # Prebuilt multi-arch image from GHCR. :latest tracks releases; :main tracks
    # the latest commit. To build from source instead, comment out `image:` and
    # uncomment the `build:` block below.
    image: ghcr.io/ycsgc1/spinsense:latest
    # build:
    #   context: .
    #   dockerfile: docker/Dockerfile
    container_name: spinsense_engine
    restart: unless-stopped
    
    # --- COMMENTED OUT FOR MAC TESTING ---
    devices:
     - "/dev/snd:/dev/snd"
    group_add:
      - "29"
    ipc: host

    network_mode: host

    environment:
      - SPINSENSE_DATA_DIR=/app/data
      - SPINSENSE_PORT=3313        # app binds host :3313 (a nod to 33⅓ RPM)
    volumes:
      - ./data:/app/data
      - /tmp:/tmp

    # network_mode: host (above) is REQUIRED for mDNS Home Assistant discovery —
    # multicast does not cross Docker bridge networking. Under host mode the app
    # binds SPINSENSE_PORT directly on the host, so there is no ports: mapping.
    # If you switch to bridge networking (no HA auto-discovery), expose it with:
    #   ports:
    #     - "3313:3313"