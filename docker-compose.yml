services:
  spinsense:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: spinsense_engine
    restart: unless-stopped
    
    # --- COMMENTED OUT FOR MAC TESTING ---
    devices:
     - "/dev/snd:/dev/snd"
    group_add:
      - "29"
    ipc: host

    network_mode: host

    environment:
      - SPINSENSE_DATA_DIR=/app/data
    volumes:
      - ./data:/app/data
      - /tmp:/tmp
      
    # Map Mac port 3313 to Container port 8000
   # ports:
    #  - "3313:8000"