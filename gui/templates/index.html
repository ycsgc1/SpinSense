<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpinSense Dashboard</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <header>
        <h1>SpinSense Control Panel</h1>
        <div class="engine-controls">
            <span id="engine-status-badge" class="badge stopped">Engine: Stopped</span>
            <button id="btn-start" class="btn success">Start Listening</button>
            <button id="btn-stop" class="btn danger">Stop</button>
        </div>
    </header>

    <main>
        <section class="card live-status">
            <h2>Live Playback</h2>
            
            <div class="volume-container">
                <label>Mic Input Level (RMS)</label>
                <div class="meter-bg">
                    <div id="volume-bar" class="meter-fill"></div>
                </div>
                <span id="volume-text">0.000</span>
            </div>

            <div class="now-playing">
                <img id="album-art" src="/static/placeholder.jpg" alt="Album Art">
                <div class="track-info">
                    <h3 id="track-title">Waiting for drop...</h3>
                    <p id="track-artist">Artist</p>
                    <p id="track-album">Album</p>
                </div>
            </div>
        </section>

        <section class="card config-section">
            <div class="config-header">
                <h2>Configuration</h2>
                <button id="btn-save-config" class="btn primary">Save Settings</button>
            </div>
            
            <form id="config-form" class="grid-form">
                <fieldset>
                    <legend>Hardware</legend>
                    <label for="mic-device">Audio Input Device</label>
                    <select id="mic-device" name="Hardware.Mic_Device"></select>
                </fieldset>

                <fieldset>
                    <legend>Audio Engine</legend>
                    <label for="vol-threshold">Volume Threshold</label>
                    <input type="number" id="vol-threshold" name="Audio.Volume_Threshold" step="0.0001">
                    
                    <label for="sample-len">Sample Length (sec)</label>
                    <input type="number" id="sample-len" name="Audio.Song_Sample_Length" step="0.1">
                </fieldset>

                <fieldset>
                    <legend>MQTT Broker</legend>
                    <label for="mqtt-host">Host</label>
                    <input type="text" id="mqtt-host" name="MQTT.Broker.Host">
                    
                    <label for="mqtt-port">Port</label>
                    <input type="number" id="mqtt-port" name="MQTT.Broker.Port">
                </fieldset>
            </form>
        </section>
    </main>

    <script src="/static/app.js"></script>
</body>
</html>
